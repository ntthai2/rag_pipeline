services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  jina-embedding:
    image: michaelf34/infinity:0.0.77
    container_name: jina-embedding
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 3G
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    ports:
      - "18081:18081"
    volumes:
      - ./hf_cache:/app/.cache
    environment:
      - CUDA_VISIBLE_DEVICES=0
    command: v2 --model-id jinaai/jina-embeddings-v3 --batch-size 32 --port 18081 --engine torch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      jina-embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  qdrant_data:
